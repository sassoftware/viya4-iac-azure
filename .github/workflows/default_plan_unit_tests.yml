name: Default Plan Unit Tests
on:
  push:
    branches: ['**'] # '*' will cause the workflow to run on all commits to all branches.

permissions:
  id-token: write  # Required for OIDC authentication
  contents: read

jobs:
  go-tests:
    name: Default Plan Unit Tests
    runs-on: ubuntu-latest
    # Only require approval for main branch; other branches run automatically
    environment: ${{ github.ref == 'refs/heads/main' && 'terraformSecrets' || '' }}
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Azure Login using OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      
      - name: Verify Azure Authentication
        run: |
          echo "✅ Azure OIDC login successful"
          az account show
      
      - name: Build Docker Image
        run: docker build -t viya4-iac-azure:terratest -f Dockerfile.terratest .
      
      - name: Run Tests with OIDC Auth
        run: |
          docker run \
            -e TF_VAR_subscription_id=${{ vars.AZURE_SUBSCRIPTION_ID }} \
            -e TF_VAR_tenant_id=${{ vars.AZURE_TENANT_ID }} \
            -e TF_VAR_client_id=${{ vars.AZURE_CLIENT_ID }} \
            -e ARM_USE_OIDC=true \
            -e ARM_USE_CLI=true \
            -e AZURE_CORE_ONLY_SHOW_ERRORS=true \
            -v $(pwd):/viya4-iac-azure \
            -v $HOME/.azure:/root/.azure \
            viya4-iac-azure:terratest -v
